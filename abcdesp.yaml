esphome:
  name: abcdesp
  friendly_name: ABCDESP HVAC

external_components:
  - source:
      type: git
      url: https://github.com/aclight/abcdesp
      ref: main
    refresh: 0s
    components: [abcdesp]

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "ABCDESP-Fallback"
    password: !secret wifi_fallback_password

captive_portal:

# ----------------------------------------------------------------
# Bluetooth Proxy
# ----------------------------------------------------------------
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: abcdesp_uart
  tx_pin: GPIO6
  rx_pin: GPIO5
  baud_rate: 38400
  data_bits: 8
  stop_bits: 1
  parity: NONE

abcdesp:
  id: hvac
  name: "HVAC"
  icon: "mdi:hvac"
  uart_id: abcdesp_uart
  hold_duration_minutes: 120  # 0 = permanent hold (default)
  allow_control_lock:
    name: "Allow Control"
  outdoor_temp_sensor:
    name: "Outdoor Temperature"
  indoor_humidity_sensor:
    name: "Indoor Humidity"
  airflow_cfm_sensor:
    name: "Airflow CFM"
  heat_stage_sensor:
    name: "Heat Stage"
  heat_stage_text_sensor:
    name: "Heat Stage Label"
  hp_coil_temp_sensor:
    name: "HP Coil Temperature"
  hp_stage_sensor:
    name: "HP Stage"
  hp_stage_text_sensor:
    name: "HP Stage Label"
  blower_sensor:
    name: "Blower Running"
  comms_ok_sensor:
    name: "Communication OK"
  hold_active_sensor:
    name: "Hold Active"
  hold_time_remaining_sensor:
    name: "Hold Time Remaining"
  clear_hold_button:
    name: "Clear Hold"
  hold_duration_number:
    name: "Hold Duration"
  set_hold_time_number:
    name: "Set Hold Time"
  vacation_days_number:
    name: "Vacation Days"
  vacation_min_temp_number:
    name: "Vacation Min Temp"
  vacation_max_temp_number:
    name: "Vacation Max Temp"
  activate_vacation_button:
    name: "Activate Vacation"
  cancel_vacation_button:
    name: "Cancel Vacation"
  last_seen_sensor:
    name: "Last Seen"

# ----------------------------------------------------------------
# Status LED — WS2812C on M5Stack AtomS3 Lite (GPIO35)
# Replicates thermostat red/blue LED behavior:
#   solid = mode enabled, blinking = actively running
# ----------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO35
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    name: "Status LED"
    internal: true
    default_transition_length: 0ms

interval:
  - interval: 500ms
    then:
      - lambda: |-
          static bool blink_on = true;
          blink_on = !blink_on;

          auto mode = id(hvac).mode;
          auto action = id(hvac).action;

          if (mode == climate::CLIMATE_MODE_OFF) {
            auto call = id(status_led).turn_off();
            call.set_transition_length(0);
            call.perform();
            return;
          }

          if (action == climate::CLIMATE_ACTION_HEATING) {
            if (blink_on) {
              auto call = id(status_led).turn_on();
              call.set_rgb(1.0f, 0.0f, 0.0f);
              call.set_brightness(0.5f);
              call.set_transition_length(0);
              call.perform();
            } else {
              auto call = id(status_led).turn_off();
              call.set_transition_length(0);
              call.perform();
            }
          } else if (action == climate::CLIMATE_ACTION_COOLING) {
            if (blink_on) {
              auto call = id(status_led).turn_on();
              call.set_rgb(0.0f, 0.0f, 1.0f);
              call.set_brightness(0.5f);
              call.set_transition_length(0);
              call.perform();
            } else {
              auto call = id(status_led).turn_off();
              call.set_transition_length(0);
              call.perform();
            }
          } else if (mode == climate::CLIMATE_MODE_HEAT) {
            auto call = id(status_led).turn_on();
            call.set_rgb(1.0f, 0.0f, 0.0f);
            call.set_brightness(0.3f);
            call.set_transition_length(0);
            call.perform();
          } else if (mode == climate::CLIMATE_MODE_COOL) {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.0f, 0.0f, 1.0f);
            call.set_brightness(0.3f);
            call.set_transition_length(0);
            call.perform();
          } else if (mode == climate::CLIMATE_MODE_HEAT_COOL) {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.6f, 0.0f, 1.0f);
            call.set_brightness(0.3f);
            call.set_transition_length(0);
            call.perform();
          }

# ----------------------------------------------------------------
# Diagnostics
# ----------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
  - platform: internal_temperature
    name: "ESP Temperature"

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "Mac Address"
    ssid:
      name: "Connected SSID"
  - platform: version
    name: "Version"
    hide_timestamp: true
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: "Online"
