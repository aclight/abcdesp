esphome:
  name: abcdesp
  friendly_name: ABCDESP HVAC

external_components:
  - source:
      type: git
      url: https://github.com/aclight/abcdesp
      ref: main
    components: [abcdesp]

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 0  # disable logging on UART0 to avoid bus noise

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ABCDESP-Fallback"
    password: !secret fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: abcdesp_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 38400
  data_bits: 8
  stop_bits: 1
  parity: NONE

switch:
  - platform: template
    name: "Allow Control"
    id: allow_control
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:lock-open-variant"

abcdesp:
  name: "HVAC"
  icon: "mdi:hvac"
  uart_id: abcdesp_uart
  flow_pin:
    number: GPIO4
    mode:
      output: true
  allow_control_switch: allow_control
  outdoor_temp_sensor:
    name: "Outdoor Temperature"
  indoor_humidity_sensor:
    name: "Indoor Humidity"
  airflow_cfm_sensor:
    name: "Airflow CFM"
  heat_stage_sensor:
    name: "Heat Stage"
  hp_coil_temp_sensor:
    name: "HP Coil Temperature"
  hp_stage_sensor:
    name: "HP Stage"
  blower_sensor:
    name: "Blower Running"
  comms_ok_sensor:
    name: "Communication OK"
  hold_active_sensor:
    name: "Hold Active"
  clear_hold_button:
    name: "Clear Hold"
