esphome:
  name: abcdesp
  friendly_name: ABCDESP HVAC

external_components:
  - source:
      type: local
      path: components
    components: [abcdesp]

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 0  # disable logging on UART0 to avoid bus noise

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ABCDESP-Fallback"
    password: !secret fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: abcdesp_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 38400
  data_bits: 8
  stop_bits: 1
  parity: NONE

sensor:
  - platform: template
    name: "Outdoor Temperature"
    id: outdoor_temp
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  - platform: template
    name: "Airflow CFM"
    id: airflow_cfm
    unit_of_measurement: "CFM"
    accuracy_decimals: 0
    icon: "mdi:fan"
    state_class: measurement

  - platform: template
    name: "Heat Stage"
    id: heat_stage
    accuracy_decimals: 0
    icon: "mdi:fire"
    state_class: measurement

binary_sensor:
  - platform: template
    name: "Blower Running"
    id: blower_running
    device_class: running

abcdesp:
  name: "HVAC"
  uart_id: abcdesp_uart
  flow_pin:
    number: GPIO4
    mode:
      output: true
  outdoor_temp_sensor: outdoor_temp
  airflow_cfm_sensor: airflow_cfm
  blower_sensor: blower_running
  heat_stage_sensor: heat_stage
